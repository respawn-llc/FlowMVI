name: Publish a new Release

on:
  push:
    tags:
      - '3.*'
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
        description: 'Tag to use for the release and changelog'

concurrency:
  group: "publish"
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

jobs:
  debugger-macos:
    uses: ./.github/workflows/desktop-macos.yml
    secrets: inherit
  debugger-linux:
    uses: ./.github/workflows/desktop-linux.yml
    secrets: inherit
  debugger-win:
    uses: ./.github/workflows/desktop-win.yml
    secrets: inherit
  publish:
    needs: [ debugger-macos, debugger-linux, debugger-win ]
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Decode Keystore
        id: decode_keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PATH: ./certificates/keystore.jks
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          check-latest: true
          java-version: 23
          cache: 'gradle'

      - name: Validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Create local properties
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: echo "$LOCAL_PROPERTIES" | base64 --decode > local.properties

      - name: Cache konan directory
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('*.gradle.kts', 'buildSrc/*') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Assemble android sample
        run: ./gradlew :sample:assembleRelease

      - name: Publish to sonatype
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache

      - name: Generate Changelog
        uses: mikepenz/release-changelog-builder-action@v6
        id: build_changelog
        with:
          commitMode: true
          configuration: ".github/changelog_config.json"

      - name: Publish new plugin version
        run: ./gradlew debugger:ideplugin:publishPlugin --no-configuration-cache
        env:
          CHANGELOG: ${{steps.build_changelog.outputs.changelog}}

      - name: Download debugger installers
        uses: actions/download-artifact@v7
        with:
          pattern: Debugger_*
          path: release-artifacts/debugger

      - name: Validate debugger installers
        run: |
          find release-artifacts/debugger -type f -print

          macos_count="$(find release-artifacts/debugger/Debugger_MacOS -type f -name '*.dmg' -print | wc -l | tr -d ' ')"
          linux_count="$(find release-artifacts/debugger/Debugger_Linux -type f -name '*.deb' -print | wc -l | tr -d ' ')"
          windows_count="$(find release-artifacts/debugger/Debugger_Windows -type f -name '*.exe' -print | wc -l | tr -d ' ')"

          test "$macos_count" -eq 1
          test "$linux_count" -eq 1
          test "$windows_count" -eq 1

      - name: Create GH release
        uses: ncipollo/release-action@v1.20.0
        id: create_release
        with:
          draft: true
          artifactErrorsFailBuild: true
          prerelease: false
          artifacts: sample/build/outputs/apk/release/pro.respawn.flowmvi.sample.apk,release-artifacts/debugger/Debugger_MacOS/*.dmg,release-artifacts/debugger/Debugger_Linux/*.deb,release-artifacts/debugger/Debugger_Windows/*.exe
          body: ${{steps.build_changelog.outputs.changelog}}
          tag: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
